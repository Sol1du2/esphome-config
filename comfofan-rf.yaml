substitutions:
  device_name: comfofan-rf-remote
  underscore_device_name: comfofan_rf_remote
  device_friendly_name: "ComfoFan RF Remote"
  device_description: "RF reader for zehnder comfofan ventilation"

esphome:
  name: ${device_name}
  friendly_name: ${device_friendly_name}
  comment: ${device_description}

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:
  level: VERBOSE

# Enable Home Assistant API
api:
  encryption:
    key: !secret ha_api_key
  services:
    - service: set_speed
      variables:
        run_speed: int
        run_time: int
      then:
        - lambda: |-
            zehnder_fan->setSpeed(run_speed, run_time);

# Allow Over-The-Air updates
ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "ComfoFan RF Hotspot"
    password: !secret ap_password

captive_portal:

external_components:
  #- source: github://drkx/ESPHome-Zehnder-RF
  #  components: [ nrf905, zehnder ]
  - source:
      type: local
      path: local_components/ESPHome-Zehnder-RF/components
    components: [ nrf905, zehnder ]

spi:
  clk_pin: GPIO14
  mosi_pin: GPIO13
  miso_pin: GPIO12

nrf905:
  id: "nrf905_rf"
  cs_pin:   GPIO15
  cd_pin:   GPIO33
  ce_pin:   GPIO27
  pwr_pin:  GPIO26
  txen_pin: GPIO25
  # We don't need AM and DR at the moment as they are read from the inernal registers
  # am_pin: GPIO32
  # dr_pin: GPIO35

fan:
  - platform: zehnder
    id: zehnder_fan
    name: "Ventilation"
    nrf905: nrf905_rf
    update_interval: "3600s"

time:
  - platform: homeassistant
    id: homeassistant_time
    timezone: Europe/Amsterdam

button:
  - platform: restart
    id: ${underscore_device_name}_esphome_restart
    name: ${device_friendly_name} restart

  - platform: factory_reset
    name: Restart with Factory Default Settings

  - platform: template
    id: ${underscore_device_name}_reset_timer
    name: ${device_friendly_name} Reset Timer
    on_press:
      then:
        lambda: |-
          zehnder_fan->setSpeed(3, 0);

  - platform: template
    id: ${underscore_device_name}_high_10
    name: ${device_friendly_name} High 10
    on_press:
      then:
        lambda: |-
          zehnder_fan->setSpeed(3, 10);

  - platform: template
    id: ${underscore_device_name}_high_30
    name: ${device_friendly_name} High 30
    on_press:
      then:
        lambda: |-
          zehnder_fan->setSpeed(3, 30);
  
  - platform: template
    id: ${underscore_device_name}_high_60
    name: ${device_friendly_name} High 60
    on_press:
      then:
        lambda: |-
          zehnder_fan->setSpeed(3, 60);
  
  - platform: template
    name: ${device_friendly_name} Query
    on_press:
      then:
        lambda: |-
          zehnder_fan->queryDevice();

  - platform: template
    name: ${device_friendly_name} RF Listen
    on_press:
      then:
        lambda: |-
          nrf905_rf->setMode(esphome::nrf905::Receive);
